    .fade-in {

        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-marquee {
      animation: marquee 30s linear infinite;
    }

    /* ===== LIQUID GLASS DESIGN SYSTEM ===== */

    /* Glass Surface — base transparent panel */
    .glass {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.45) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    /* Glass card with hover lift */
    .glass-card {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 20px 40px rgba(0, 97, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 97, 255, 0.15);
    }

    /* Gradient glass surfaces — matching reference colors */
    .glass-blue {
      background: linear-gradient(135deg, rgba(0, 97, 255, 0.15) 0%, rgba(96, 239, 255, 0.1) 100%);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 97, 255, 0.15);
      box-shadow: 0 4px 24px rgba(0, 97, 255, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .glass-teal {
      background: linear-gradient(135deg, rgba(96, 239, 255, 0.15) 0%, rgba(16, 185, 129, 0.1) 100%);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(96, 239, 255, 0.15);
      box-shadow: 0 4px 24px rgba(16, 185, 129, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    /* Dark glass — for dark sections with colored glow */
    .glass-dark {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(30, 41, 59, 0.9) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Button glass effect */
    .btn-glass {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.5) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow:
        0 2px 12px rgba(0, 0, 0, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      transition: all 0.3s ease;
    }

    .btn-glass:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.7) 100%);
      box-shadow:
        0 8px 24px rgba(0, 97, 255, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 1);
    }

    /* Gradient glass button — blue glow */
    .btn-glass-gradient {
      background: linear-gradient(135deg, rgba(0, 97, 255, 0.9) 0%, rgba(96, 239, 255, 0.8) 100%);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow:
        0 4px 20px rgba(0, 97, 255, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .btn-glass-gradient:hover {
      box-shadow:
        0 8px 32px rgba(0, 97, 255, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transform: translateY(-1px);
    }

    /* Highlight top edge — 12% white as in reference */
    .glass-highlight {
      position: relative;
    }

    .glass-highlight::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
      border-radius: 100%;
    }

    /* Soft glow backgrounds */
    .glow-blue {
      background: radial-gradient(ellipse at 30% 50%, rgba(0, 97, 255, 0.08) 0%, transparent 70%);
    }

    .glow-teal {
      background: radial-gradient(ellipse at 70% 50%, rgba(96, 239, 255, 0.06) 0%, transparent 70%);
    }

    /* Dark section gradient combos */
    .dark-gradient-blue {
      background: linear-gradient(135deg, #0f172a 0%, #0c1a3a 50%, #0f172a 100%);
    }

    .dark-gradient-teal {
      background: linear-gradient(145deg, #0f172a 0%, #0a1f2e 60%, #0f172a 100%);
    }

    /* ===== BRAND ELEMENT ANIMATIONS ===== */

    @keyframes float-star {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      25% {
        transform: translateY(-12px) rotate(5deg);
      }

      50% {
        transform: translateY(-6px) rotate(-3deg);
      }

      75% {
        transform: translateY(-15px) rotate(4deg);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.15;
        transform: scale(1);
      }

      50% {
        opacity: 0.3;
        transform: scale(1.1);
      }
    }

    @keyframes rotate-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .star-float {
      animation: float-star 6s ease-in-out infinite;
    }

    .star-float-delay-1 {
      animation: float-star 7s ease-in-out infinite 1s;
    }

    .star-float-delay-2 {
      animation: float-star 8s ease-in-out infinite 2s;
    }

    .star-float-delay-3 {
      animation: float-star 5.5s ease-in-out infinite 0.5s;
    }

    .pulse-glow {
      animation: pulse-glow 4s ease-in-out infinite;
    }

    .rotate-slow {
      animation: rotate-slow 120s linear infinite;
    }

    .shimmer-text {
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }

    /* Brand gradient backgrounds for course directions */

    .brand-glow-programming:hover {
